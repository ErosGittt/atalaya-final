<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Profe - Atalaya Voley</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/admin-styles.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 10px;
            border-top: 5px solid #ed563b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h2 { text-align: center; margin-bottom: 30px; text-transform: uppercase; font-weight: 800; }
        .login-box input { background: #333; border: 1px solid #444; color: white; margin-bottom: 20px; height: 45px; }
        .login-box .btn-login { background: #ed563b; border: none; width: 100%; height: 45px; font-weight: 700; text-transform: uppercase; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2><em> Acceso Staff</em></h2>
            <form id="form-login">
                <input type="email" id="login-email" class="form-control" placeholder="Correo del profesor" required>
                <input type="password" id="login-password" class="form-control" placeholder="Contraseña" required>
                <button type="submit" class="btn-login">Entrar al Panel</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Mismas credenciales de siempre
        const firebaseConfig = {
            apiKey: "AIzaSyAxOLazfo6owST3A5QPbAm2w9VbhvWR5MQ",
            authDomain: "atalaya-voley.firebaseapp.com",
            projectId: "atalaya-voley",
            storageBucket: "atalaya-voley.firebasestorage.app",
            messagingSenderId: "493040370811",
            appId: "1:493040370811:web:c6dda7f25fb98729290ede"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('form-login').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    window.location.href = "admin.html"; // Si es correcto, va al panel
                })
                .catch((error) => {
                    alert("Acceso denegado. Revisa tus credenciales.");
                });
        });
    </script>
</body>
</html>
